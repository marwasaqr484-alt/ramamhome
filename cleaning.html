  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAfvx1cigRlVDlMKT4dTNp8AF2_a9yfkvE",
    authDomain: "ramam-85e12.firebaseapp.com",
    projectId: "ramam-85e12",
    storageBucket: "ramam-85e12.firebasestorage.app",
    messagingSenderId: "202427188819",
    appId: "1:202427188819:web:edb78eacf649487f8f68a6",
    measurementId: "G-X1KQ8QM55T"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  let currentUserId = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      currentUserId = user.uid;
      enableAddButtons(true);
    } else {
      currentUserId = null;
      enableAddButtons(false);
      alert("يجب تسجيل الدخول لإضافة منتجات للسلة.");
    }
  });

  function enableAddButtons(enable) {
    document.querySelectorAll(".addToCartBtn").forEach(btn => {
      btn.disabled = !enable;
    });
  }

  async function addToCart(product) {
  if (!currentUserId) {
    alert("يرجى تسجيل الدخول أولاً.");
    return;
  }

  // نضيف معرف المستخدم للمنتج
  const productWithUser = {...product, userId: currentUserId, timestamp: new Date().toISOString()};

  // نجلب السلة الحالية من localStorage أو نهيئها
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  // نضيف المنتج الجديد للسلة
  cart.push(productWithUser);

  // نحفظ السلة المحدثة في localStorage
  localStorage.setItem("cart", JSON.stringify(cart));

  alert("✅ تمت الإضافة إلى السلة");
}

  
  // زيادة أو نقصان الكمية في كل منتج
  function changeQuantity(productIndex, delta) {
  // بدلاً من البحث بالـ id الثابت، نجيب العنصر من الزر نفسه
  const productCard = event.target.closest('.product-card');
  const qtyElem = productCard.querySelector('span[id^="qty-"]');

  let currentQty = parseInt(qtyElem.textContent);
  currentQty += delta;
  if (currentQty < 1) currentQty = 1;
  qtyElem.textContent = currentQty;
}


  window.addToCart = addToCart;
  window.changeQuantity = changeQuantity;

<script>
  // نختار كل الصور المصغرة في الصفحة
  document.querySelectorAll('.color-thumbnails img').forEach(thumbnail => {
    thumbnail.addEventListener('click', () => {
      // نحدد العنصر الأب اللي يحتوي الصورة الكبيرة وصورة العين والقلب (image-wrapper)
      const imageWrapper = thumbnail.closest('.product-card').querySelector('.image-wrapper');
      // نختار الصورة الكبيرة داخل image-wrapper
      const mainImage = imageWrapper.querySelector('img');
      // نغير src للصورة الكبيرة الى src الصورة المصغرة اللي اضغطنا عليها
      mainImage.src = thumbnail.src;
      // لو عندك alt تريد تغييره كذلك، تضيف هنا mainImage.alt = thumbnail.alt;
    });
  });

  // تكبير الصورة عند الضغط على رمز العين
  document.querySelectorAll('.eye-icon').forEach(eye => {
    eye.addEventListener('click', () => {
      const imageWrapper = eye.closest('.product-card').querySelector('.image-wrapper');
      const mainImage = imageWrapper.querySelector('img');
      // نفتح الصورة الكبيرة في نافذة جديدة بحجمها الكامل
      window.open(mainImage.src, '_blank');
    });
  });
</script>

}

#searchInput:focus {
  box-shadow: 0 0 15px rgba(108, 129, 38, 0.8), 0 0 25px rgba(108, 129, 38, 0.5);
  transform: scale(1.04);
}

/* حركة عند المرور */
#searchInput:hover {
  box-shadow: 0 0 12px rgba(108, 129, 38, 0.7);
  transform: scale(1.03);
}

/* تحسين عرض الموبايل */
@media (max-width: 600px) {
  #searchInput {
    font-size: 20px;
    height: 50px;
  }
}
</style>


<script>
document.addEventListener('DOMContentLoaded', function () {
  const input = document.getElementById('searchInput');
  const cards = Array.from(document.querySelectorAll('.products-container .product-card'));

  function filterProducts() {
    const term = (input.value || '').trim().toLowerCase();

    cards.forEach(card => {
      // ناخد اسم المنتج من <h3> إن وجد، وإلا ناخد كل نص الكارت
      const nameEl = card.querySelector('h3');
      const text = (nameEl ? nameEl.textContent : card.textContent).toLowerCase();

      // نظهر/نخفي حسب التطابق
      card.style.display = text.includes(term) ? '' : 'none';
    });
  }

  // شغّل البحث أثناء الكتابة
  input.addEventListener('input', filterProducts);
});
</script>
<script>
  // تحديث عداد السلة حسب محتوى localStorage
  function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem("cart")) || [];
    const totalQty = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
    document.getElementById("cartCountBadge").textContent = totalQty;
  }

  // الذهاب لصفحة السلة عند الضغط
  function goToCart() {
    window.location.href = "cart.html"; // يبقى اسم صفحة الكارت كما هو
  }

  // تحديث العداد عند تحميل الصفحة
  window.addEventListener("load", updateCartCount);

  // تحديث العداد تلقائيًا بعد أي تغيير في السلة
  window.addEventListener("storage", updateCartCount);
</script>

</body>
</html>
