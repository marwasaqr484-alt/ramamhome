<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>OWNER RAMAM HOME</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  orderBy,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAfvx1cigRlVDlMKT4dTNp8AF2_a9yfkvE",
  authDomain: "ramam-85e12.firebaseapp.com",
  projectId: "ramam-85e12",
  storageBucket: "ramam-85e12.firebasestorage.app",
  messagingSenderId: "202427188819",
  appId: "1:202427188819:web:edb78eacf649487f8f68a6",
  measurementId: "G-X1KQ8QM55T"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function formatTimestamp(ts) {
  if (!ts) return "No time available";
  const date = ts.toDate();
  return date.toLocaleString("ar-EG", { hour12: true });
}

async function loadInvoices() {
  const invoicesContainer = document.getElementById("invoices");
  invoicesContainer.innerHTML = "";

  const q = query(collection(db, "invoices"), orderBy("timestamp", "desc"));
  const querySnapshot = await getDocs(q);

  if (querySnapshot.empty) {
    invoicesContainer.textContent = "No invoices yet.";
    return;
  }

  let invoiceNumber = querySnapshot.size;  // نبدأ من عدد الفواتير الكلي

  querySnapshot.forEach(docSnap => {
    const data = docSnap.data();

    const div = document.createElement("div");
    div.classList.add("invoice-container");
    div.style.border = "1px solid #ccc";
    div.style.padding = "15px";
    div.style.marginBottom = "20px";
    div.style.borderRadius = "8px";
    div.style.backgroundColor = "#6c812644";
    div.classList.add("invoice-container");
    // إضافة اللوجو أعلى يسار الفاتورة
const logoImg = document.createElement("img");
logoImg.src = "assets/img/logo.png"; // مسار اللوجو بالنسبة للملف
logoImg.style.width = "300px";
logoImg.style.height = "auto";
logoImg.style.display = "block";
logoImg.style.marginBottom = "10px";
logoImg.style.objectFit = "contain";
logoImg.style.float = "left";
div.appendChild(logoImg);

    // نعرض العداد الحالي كرقم الفاتورة
    const title = document.createElement("h3");
title.textContent = `Invoice No : ${invoiceNumber}`;
title.style.fontSize = "50px"; // غيّري الرقم هنا عشان تتحكمي بالحجم
title.style.marginBottom = "15px"; // مسافة تحت العنوان
title.style.color = "#4a5c1a"; // لو حابة تحافظي على اللون زي قبل
invoiceNumber--;  
div.appendChild(title);


    // باقي الكود بدون تغيير...

    // بيانات العميل
 // بيانات العميل
const clientNameP = document.createElement("p");
clientNameP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Customer Name:</strong> <span>${data.userName || "Not available"}</span>
  </div>
`;
div.appendChild(clientNameP);

const clientPhoneP = document.createElement("p");
clientPhoneP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Customer Phone:</strong> <span>${data.userPhone || "Not available"}</span>
  </div>
`;
div.appendChild(clientPhoneP);

const clientEmailP = document.createElement("p");
clientEmailP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Email:</strong> <span>${data.userEmail || "Not available"}</span>
  </div>
`;
div.appendChild(clientEmailP);

const clientAddressP = document.createElement("p");
clientAddressP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Address:</strong> <span>${data.userAddress || "Not available"}</span>
  </div>
`;
div.appendChild(clientAddressP);

const timeP = document.createElement("p");
timeP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Time:</strong> 
    <span>
      ${data.timestamp ? data.timestamp.toDate().toLocaleDateString("en-US") : "No date"} 
      - 
      ${data.timestamp ? data.timestamp.toDate().toLocaleTimeString("en-US", { hour12: true }) : "No time"}
    </span>
  </div>
`;
div.appendChild(timeP);


const deliveryP = document.createElement("p");
deliveryP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Delivery:</strong> <span>${data.deliveryOption === "Yes" ? "Yes" : "No"}</span>
  </div>
`;
div.appendChild(deliveryP);

const totalP = document.createElement("p");
totalP.innerHTML = `
  <div style="display: flex; align-items: center; gap: 10px; font-size:35px; flex-wrap: nowrap;">
    <strong>Total:</strong> <span>${data.totalPrice.toFixed(2)} EGP</span>
  </div>
`;
div.appendChild(totalP);

    const itemsList = document.createElement("ul");
    itemsList.style.listStyle = "none";
    itemsList.style.padding = "0";
data.items.forEach(item => {
  const li = document.createElement("li");
  li.style.display = "flex";
  li.style.alignItems = "center";
  li.style.marginBottom = "8px";

  const img = document.createElement("img");
  img.src = item.image || "https://via.placeholder.com/50";
  img.width = 190;
  img.height = 190;
  img.style.marginLeft = "10px";

  const span = document.createElement("span");
  span.innerHTML = `
  ${item.name}<br>
  <div style="display: flex; align-items: center; gap: 5px; font-size:40px;">
    <strong>Price:</strong> <span>${item.price} EGP</span>
  </div>
  <div style="display: flex; align-items: center; gap: 5px; font-size:40px;">
    <strong>Quantity:</strong> <span>${item.quantity || 1}</span>
  </div>
`;

  li.appendChild(img);
  li.appendChild(span);
  itemsList.appendChild(li);
});

    div.appendChild(itemsList);

    // أزرار الطباعة والحذف
    const printBtn = document.createElement("button");
    printBtn.textContent = "Print";
    printBtn.style.marginLeft = "10px";
    printBtn.onclick = () => {
  const printWindow = window.open("", "", "width=800,height=600");
  
  printWindow.document.write(`
    <html dir="rtl" lang="ar">
    <head>
      <title> Print Invoice</title>
      <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; position: relative; }
        .watermark {
          position: fixed;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%) rotate(-30deg);
          font-size: 7rem;
          color: rgba(0,0,0,0.2);
          z-index: -1;
          white-space: nowrap;
          pointer-events: none;
        }
        img.logo {
          width: 100px;
          height: auto;
          display: block;
          margin-bottom: 10px;
          object-fit: contain;
        }
        /* إخفاء الأزرار عند الطباعة */
        @media print {
          button {
            display: none !important;
          }
        }
      </style>
    </head>
    <body>
      <div class="watermark">RAMAM HOME</div>
      <img class="logo" src="assets/img/logo.png" alt="Logo" />
      ${div.innerHTML}
    </body>
    </html>
  `);

  printWindow.document.close();
  printWindow.focus();
  printWindow.print();
  printWindow.close();
};


    const deleteBtn = document.createElement("button");
    deleteBtn.textContent = "Delete";
    deleteBtn.style.marginLeft = "10px";
    deleteBtn.onclick = async () => {
      if (confirm("Are you sure you want to delete this invoice?")) {
        try {
          await deleteDoc(doc(db, "invoices", docSnap.id));
          alert("Invoice deleted successfully..");
          loadInvoices(); // إعادة تحميل الفواتير لتحديث العرض
        } catch (error) {
          alert("An error occurred while deleting the invoice..");
          console.error(error);
        }
      }
    };

    div.appendChild(printBtn);
    div.appendChild(deleteBtn);

    invoicesContainer.appendChild(div);
  });
}
// إضافة العلامة المائية للنص
const style = document.createElement("style");
style.textContent = `
.invoice-container {
  position: relative;
}
.invoice-container::after {
  content: "RAMAM HOME";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(-30deg);
  font-size: 9rem;
  color: rgba(0,0,0,0.2);
  white-space: nowrap;
  pointer-events: none;
  z-index: 0;
}
.invoice-container * {
  position: relative;
  z-index: 1;
}
`;
document.head.appendChild(style);

window.onload = () => {
  loadInvoices();
};

</script>
<style>
  /* عام للصفحة */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background-color: #cdbc87; /* بيج فاتح */
  color: #3b3b3b;
  margin: 0;
  padding: 20px;
  line-height: 1.6;
}

/* العنوان */
h1 {
  text-align: center;
  color: #6c8126; /* زيتي */
  margin-bottom: 25px;
  font-size: 1.8rem;
}

/* حاوية الفواتير */
#invoices > div {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

/* تأثير عند المرور على الفاتورة */
#invoices > div:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

/* العناوين الداخلية */
#invoices h3 {
  color: #4a5c1a; /* لون زيتي داكن */
  margin-bottom: 10px;
}

/* الفقرات */
#invoices p {
  margin: 5px 0;
  font-size: .9rem;
}

/* قائمة المنتجات */
#invoices ul li {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
  font-size: 2.5rem;
}

#invoices ul li img {
  border-radius: 6px;
}

/* الأزرار */
button {
  background-color: #6c8126; /* زيتي */
  color: #fff;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 2rem;
  transition: all 0.3s ease;
  box-shadow: 0 4px 6px rgba(0,0,0,0.15);
  margin-top: 10px;
}

button:hover {
  background-color: #5a6a20;
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* رابط العودة */
a {
  display: block;
  text-align: center;
  margin-top: 30px;
  color: #fff;
  background-color: #6c8126;
  padding: 12px 0;
  border-radius: 8px;
  text-decoration: none;
  font-size: 1rem;
  box-shadow: 0 4px 6px rgba(0,0,0,0.15);
  transition: all 0.3s ease;
}

a:hover {
  background-color: #5a6a20;
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

/* تحسين التناسب مع الموبايل */
@media screen and (max-width: 480px) {
  body {
    padding: 15px;
  }
  
  h1 {
    font-size: 5.5rem;
  }
  
  #invoices > div {
    padding: 12px;
  }
  
  #invoices p, #invoices ul li {
    font-size: .9rem;
  }
  
  button, a {
    padding: 10px 15px;
    font-size: 0.9rem;
  }
  
  #invoices ul li img {
    width: 35px;
    height: 35px;
  }
}

</style>
</head>
<body>
<h1 style="font-size: 48px;">Customer Invoices</h1>
<div id="invoices" style="background-color: #cdbc87;"></div>
<a href="index.html" style="display:block; margin-top:30px;font-size: 31px;">
   Back to Home Page
</a>
</body>
</html>
