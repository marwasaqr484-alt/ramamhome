<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title> RAMAM HOME</title>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      updateProfile
    } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc
    } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAfvx1cigRlVDlMKT4dTNp8AF2_a9yfkvE",
      authDomain: "ramam-85e12.firebaseapp.com",
      projectId: "ramam-85e12",
      storageBucket: "ramam-85e12.firebasestorage.app",
      messagingSenderId: "202427188819",
      appId: "1:202427188819:web:edb78eacf649487f8f68a6",
      measurementId: "G-X1KQ8QM55T"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    window.onload = () => {
      const loginForm = document.getElementById("loginForm");
      const registerForm = document.getElementById("registerForm");
      const toggleLink = document.getElementById("toggleLink");
      const messageDiv = document.getElementById("message");
      const loginTitle = document.getElementById("loginTitle");
      const registerTitle = document.getElementById("registerTitle");

      // Toggle between login and register forms and titles
      toggleLink.onclick = (e) => {
        e.preventDefault();
        if (loginForm.style.display === "none") {
          loginForm.style.display = "block";
          registerForm.style.display = "none";
          loginTitle.style.display = "block";
          registerTitle.style.display = "none";
          toggleLink.textContent = "Create a new account";
          messageDiv.textContent = "";
        } else {
          loginForm.style.display = "none";
          registerForm.style.display = "block";
          loginTitle.style.display = "none";
          registerTitle.style.display = "block";
          toggleLink.textContent = "Already have an account? Log in";
          messageDiv.textContent = "";
        }
      };

      // تسجيل دخول
     loginForm.onsubmit = async (e) => {
  e.preventDefault();
  const email = loginForm.email.value;
  const password = loginForm.password.value;

  // شرط خاص للدخول على صفحة المالك مباشرة بدون تسجيل في Firebase
  if(email === "01030272927" && password === "Ramamhome123@@@") {
    window.location.href = "invoice_owner.html"; // غيّر اسم الصفحة لو لازم
    return;  // يمنع استمرار تنفيذ باقي الكود
  }

  // باقي كود تسجيل الدخول العادي...
  try {
    await signInWithEmailAndPassword(auth, email, password);
    messageDiv.style.color = "green";
    messageDiv.textContent = " Logged in successfully! Redirecting...";
    setTimeout(() => {
      window.location.href = "profile.html";
    }, 1500);
  } catch (err) {
    messageDiv.style.color = "red";
    messageDiv.textContent = " Login error :" + err.message;
  }
};

      // إنشاء حساب جديد
      registerForm.onsubmit = async (e) => {
        e.preventDefault();
        const name = registerForm.name.value.trim();
        const phone = registerForm.phone.value.trim();
        const address = registerForm.address.value.trim();
        const email = registerForm.email.value.trim();
        const password = registerForm.password.value;

        try {
          const userCredential = await createUserWithEmailAndPassword(auth, email, password);
          const user = userCredential.user;

          await updateProfile(user, { displayName: name });

          await setDoc(doc(db, "users", user.uid), {
            name,
            phone,
            address,
            email
          });

          messageDiv.style.color = "green";
          messageDiv.textContent = "Account created successfully! Redirecting...";
          setTimeout(() => {
            window.location.href = "profile.html";
          }, 1500);
        } catch (err) {
          if (err.code === 'auth/email-already-in-use') {
            messageDiv.style.color = "red";
            messageDiv.innerHTML = `This email is already in use. Please <a href="#" id="toLogin" style="color:blue; text-decoration:underline;"> Log in</a> instead of creating a new account.`;
            document.getElementById("toLogin").onclick = (e) => {
              e.preventDefault();
              // تحويل للنموذج تسجيل دخول
              loginForm.style.display = "block";
              registerForm.style.display = "none";
              loginTitle.style.display = "block";
              registerTitle.style.display = "none";
              toggleLink.textContent = "Create a new account";
              messageDiv.textContent = "";
            };
          } else {
            messageDiv.style.color = "red";
            messageDiv.textContent = "Error creating account: " + err.message;
          }
        }
      };

      // ابدأ بالنموذج تسجيل دخول
      loginForm.style.display = "block";
      registerForm.style.display = "none";
      loginTitle.style.display = "block";
      registerTitle.style.display = "none";
      toggleLink.textContent = " Create a new account";
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #cdbc87;
      color: #3B3F15;
      margin: 0;
      padding: 35px 30px;
      min-height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h2 {
      font-weight: 700;
      font-size: 42px; /* أكبر */
      color: #2d3a2f;
      margin-bottom: 50px;
      text-align: center;
    }

    form {
  background-color: #FFF9E6;
  width: 100%;
  max-width: 850px; /* زودنا العرض من 460px إلى 520px */
  padding: 50px 45px;
  border-radius: 40px;
  box-shadow: 0 10px 45px #2d3a2f;
  margin-bottom: 40px;
  box-sizing: border-box;
  transition: box-shadow 0.3s ease;
}


    form:hover,
    form:focus-within {
      box-shadow: 0 14px 55px rgba(112, 130, 56, 0.7);
    }

    label {
      display: block;
      font-weight: 700;
      font-size: 26px; /* أكبر */
      margin-bottom: 16px;
      color: #556B2F;
    }

    input {
      width: 100%;
      padding: 26px 24px; /* أكبر */
      font-size: 24px; /* أكبر */
      font-weight: 700;
      border: 4px solid #C6C2A8;
      border-radius: 26px;
      margin-bottom: 40px;
      background-color: #FEFBEF;
      color: #3B3F15;
      box-sizing: border-box;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    input::placeholder {
      color: #A1A37D;
      font-weight: 600;
    }

    input:focus {
      outline: none;
      border-color: #708238;
      box-shadow: 0 0 22px 6px rgba(112, 130, 56, 0.85);
      background-color: #fff;
    }

    button {
      width: 100%;
      background-color: #708238;
      color: #F5F1E9;
      font-size: 32px; /* أكبر */
      font-weight: 800;
      padding: 28px 0; /* أكبر */
      border: none;
      border-radius: 36px;
      cursor: pointer;
      box-shadow: 0 18px 45px rgba(112, 130, 56, 1);
      transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
    }

    button:hover,
    button:focus {
      background-color: #5A6A27;
      box-shadow: 0 22px 50px rgba(90, 106, 39, 1);
      transform: translateY(-6px);
      outline: none;
    }

    #toggleLink {
      display: block;
      text-align: center;
      font-weight: 700;
      font-size: 28px; /* أكبر */
      color: #708238;
      cursor: pointer;
      text-decoration: underline;
      margin-top: 28px;
      user-select: none;
      transition: color 0.3s ease;
      font-family: 'Tajawal', sans-serif;
    }

    #toggleLink:hover,
    #toggleLink:focus {
      color: #5A6A27;
      outline: none;
    }

    #message {
      text-align: center;
      font-weight: 700;
      font-size: 28px; /* أكبر */
      min-height: 50px;
      margin-top: 30px;
      line-height: 1.4;
      font-family: 'Tajawal', sans-serif;
    }
  </style>
  
</head>
<body>
<h2 id="loginTitle"> Login</h2>
<form id="loginForm">
  <label for="email"> Email</label>
  <input type="text" id="email" name="email" required />
  <label for="password"> Password</label>
  <input type="password" id="password" name="password" required />
  <button type="submit"> Login</button>
</form>

<h2 id="registerTitle" style="display:none;">Create a New Account</h2>
<form id="registerForm" style="display:none;">
  <label for="name"> Full Name</label>
  <input type="text" id="name" name="name" required />
  <label for="phone"> Phone Number</label>
  <input type="tel" id="phone" name="phone" required />
  <label for="address"> Full Address</label>
  <input type="text" id="address" name="address" required />
  <label for="email"> Email</label>
  <input type="email" id="email" name="email" required />
  <label for="password">Password</label>
  <input type="password" id="password" name="password" required />
  <button type="submit"> Create Account</button>
</form>

<p style="font-size: 40px;"> ?Don't have an account
  <a href="#" id="toggleLink"> Create a New Account</a>
</p>

  <div id="message"></div>
</body>
</html>
