<title> RAMAM HOME</title>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-app.js";
  import {
    getAuth,
    signOut,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

 const firebaseConfig = {
  apiKey: "AIzaSyCH6ZZxYn3iEDuX_U2R_9oPRMNrahZY0RQ",
  authDomain: "ramamhome1.firebaseapp.com",
  projectId: "ramamhome1",
  storageBucket: "ramamhome1.firebasestorage.app",
  messagingSenderId: "569655228341",
  appId: "1:569655228341:web:8b9946180ce32b52e88bfc"
};

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      // لو مش مسجل دخول توجه لصفحة تسجيل الدخول
      window.location.href = "login.html";
      return;
    }

    // جلب بيانات المستخدم من Firestore
    const userDocRef = doc(db, "users", user.uid);
    const userDocSnap = await getDoc(userDocRef);

    if (userDocSnap.exists()) {
      const userData = userDocSnap.data();

      document.getElementById("name").textContent = userData.name || user.displayName || " Unknown";
document.getElementById("phone").textContent = userData.phone || " Not available";
document.getElementById("email").textContent = user.email || " Not available";
document.getElementById("address").textContent = userData.address || " Not available";
} else {
  // لو ما فيش بيانات في Firestore، عرض أقل شيء من auth
  // If there is no data in Firestore, display at least what's from auth
  document.getElementById("name").textContent = user.displayName || " Unknown";
  document.getElementById("phone").textContent = "-";
  document.getElementById("email").textContent = user.email || " Not available";
  document.getElementById("address").textContent = "-";
}

  });

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("logoutBtn").onclick = async () => {
      try {
        await signOut(auth);
        alert("Logged out successfully.");
        window.location.href = "login.html";
      } catch (error) {
        alert("An error occurred while logging out.");
        console.error(error);
      }
    };
  });
</script>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 400px;
    margin: 40px auto;

  }
  h2 {

    text-shadow: 1px 1px 2px #c8c1a6;

  }

    font-size: 18px;

    animation: fadeIn 0.8s ease forwards;
  }

  }

    padding: 10px 20px;

    margin-top: 25px;
    cursor: pointer;
    background-color: #556b2f; /* زيتوني */
    color: white;
    border: none;
    border-radius: 6px;
    box-shadow: 0 4px 8px rgba(85, 107, 47, 0.4);
    transition: background-color 0.3s ease, transform 0.2s ease;
  }
  button:hover {
    background-color: #435622;
    transform: scale(1.05);
  }

  /* زر العودة أسفل يمين */
  #backBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background-color: #a4ad36; /* زيتوني فاتح */
    color: #2e3b0e;
    box-shadow: 0 4px 10px rgba(164, 173, 54, 0.6);

  }
  #backBtn:hover {
    background-color: #7e891f;
    transform: scale(1.1);
  }

  /* أنيميشن fadeIn للعنصر */
  @keyframes fadeIn {
    0% {
      opacity: 0;
      transform: translateY(10px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeInDown {
    0% {
      opacity: 0;
      transform: translateY(-20px);
    }
    100% {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* تحسين العرض على شاشة الموبايل */
  @media (max-width: 480px) {
    body {
      margin: 20px 15px;
      max-width: 100%;
      padding: 15px;
    }
    p {
      font-size: 16px;
      padding: 10px 12px;
    }
    button, #backBtn {
      font-size: 14px;
      padding: 10px 16px;
    }
  }
